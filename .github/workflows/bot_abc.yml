name: Bot Autoejecutable Lector ABC

on:
  schedule:
    # Se activa cada 1 hora entre las 08:00 y las 21:00 de Argentina (11:00 a 00:00 UTC) lun-vie
    - cron: '0 11-23,0 * * 1-5'
  workflow_dispatch: # Permite ejecutar el bot manualmente desde la pestaña Actions

permissions:
  contents: write # Necesario para poder hacer el commit del JSON de memoria

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar navegadores de Playwright
        run: playwright install chromium

      - name: Ejecutar Bot Lector ABC
        env:
          ABC_USUARIO: ${{ secrets.ABC_USUARIO }}
          ABC_CLAVE: ${{ secrets.ABC_CLAVE }}
          EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_ACTIONS: "true"
        run: python main.py

      - name: Guardar Memoria Multiusuario y DB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ofertas_enviadas.json ofertas_db.json vencimientos.json || echo "No hay archivos nuevos"
          git commit -m "bot: actualiza memoria persistente y DB [skip ci]" || echo "Sin cambios"
          git push
